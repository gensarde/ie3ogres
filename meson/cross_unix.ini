[constants]
toolchain = '@GLOBAL_SOURCE_ROOT@' / 'tools' / 'metroskrew' / 'bin'

[binaries]
c      = [toolchain / 'mwccarm',  '-wrap:sdk', 'dsi/1.2p1']
c_ld   = [toolchain / 'mwldarm',  '-wrap:sdk', 'dsi/1.2p1']
cpp    = [toolchain / 'mwccarm',  '-wrap:sdk', 'dsi/1.2p1']
cpp_ld = [toolchain / 'mwldarm',  '-wrap:sdk', 'dsi/1.2p1']
nasm   = [toolchain / 'mwasmarm', '-wrap:sdk', 'dsi/1.2p1']
ar     = [toolchain / 'mwldarm',  '-wrap:sdk', 'dsi/1.2p1']
strip   = ['false']

[host_machine]
system      = 'bare metal'
cpu_family  = 'arm'
cpu         = 'arm'
endian      = 'little'
